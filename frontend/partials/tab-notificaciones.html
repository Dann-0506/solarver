<div class="section-header" style="margin-bottom:24px">
  <h3>Recordatorios de pago</h3>
</div>

<!-- Sección: Panel de deudores pendientes e historial de envíos -->
<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
  
  <div style="background:white;border-radius:14px;border:1px solid var(--border);overflow:hidden">
    <div style="padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
      <div>
        <div style="font-family:'Sora',sans-serif;font-weight:700;font-size:.92rem">Clientes con deuda pendiente</div>
        <div style="font-size:.76rem;color:var(--muted);margin-top:2px">Lista de deudores para enviar aviso</div>
      </div>
    </div>
    <div id="recClientesLista" style="max-height:420px;overflow-y:auto">
      <div style="text-align:center;padding:32px;color:var(--muted)">Cargando...</div>
    </div>
  </div>

  <div style="background:white;border-radius:14px;border:1px solid var(--border);overflow:hidden">
    <div style="padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
      <div style="font-family:'Sora',sans-serif;font-weight:700;font-size:.92rem">Historial de envíos</div>
      <button onclick="window._cargarHistorialRec ? window._cargarHistorialRec() : (typeof cargarHistorialRec === 'function' ? cargarHistorialRec() : null)" style="padding:6px 14px;border-radius:8px;border:1.5px solid var(--border);background:white;font-size:.78rem;font-weight:600;cursor:pointer">↻</button>
    </div>
    <div id="recHistorialLista" style="max-height:420px;overflow-y:auto">
      <div style="text-align:center;padding:32px;color:var(--muted)">Cargando...</div>
    </div>
  </div>
</div>

<!-- Modal: Confirmación de canal y envío de aviso de pago -->
<div class="modal-overlay" id="recordatorioModal">
  <div class="modal" style="max-width:400px;text-align:center">
    <button class="modal-close" onclick="window._cerrarModalRecordatorio()">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <div style="width:56px;height:56px;border-radius:50%;background:#FFF4E5;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;color:#F39C12">
      <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
    </div>
    <h3 style="margin-bottom:8px">Enviar Aviso de Pago</h3>
    <p class="sub" style="margin-bottom:20px">Cliente: <strong id="recClienteNombre" style="color:var(--text)"></strong></p>
    
    <input type="hidden" id="recClienteId">
    
    <div class="form-group" style="text-align:left;margin-bottom:24px">
      <label>Canal de envío *</label>
      <select id="recCanal" style="width:100%;padding:10px;border-radius:8px;border:1.5px solid var(--border);font-family:'Sora',sans-serif">
        <option value="">Seleccionar...</option>
        <option value="correo">Correo Electrónico</option>
        <option value="sms">Mensaje SMS</option>
      </select>
    </div>

    <div class="modal-footer" style="justify-content:center">
      <button class="btn-secondary" onclick="window._cerrarModalRecordatorio()">Cancelar</button>
      <button class="btn-primary" id="btnEnviarRecordatorio" onclick="window._enviarRecordatorio()">Confirmar Envío</button>
    </div>
  </div>
</div>
