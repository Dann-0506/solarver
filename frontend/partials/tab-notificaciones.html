<div class="section-header" style="margin-bottom:24px">
  <h3>Recordatorios de pago</h3>
</div>

<div id="recAlert" style="display:none;padding:12px 16px;border-radius:8px;font-size:.84rem;font-weight:500;margin-bottom:16px;border-left:3px solid"></div>

<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
  <div style="background:white;border-radius:14px;border:1px solid var(--border);overflow:hidden">
    <div style="padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
      <div>
        <div style="font-family:'Sora',sans-serif;font-weight:700;font-size:.92rem">Clientes con deuda pendiente</div>
        <div style="font-size:.76rem;color:var(--muted);margin-top:2px">Selecciona a quiénes enviar el recordatorio</div>
      </div>
      <button onclick="seleccionarTodosRec()" style="padding:6px 14px;border-radius:8px;border:1.5px solid var(--border);background:white;font-size:.78rem;font-weight:600;cursor:pointer;font-family:'Sora',sans-serif">
        Seleccionar todos
      </button>
    </div>
    <div id="recClientesLista" style="max-height:380px;overflow-y:auto">
      <div style="text-align:center;padding:32px;color:var(--muted)">Cargando...</div>
    </div>
    <div style="padding:14px 20px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
      <span id="recSeleccionados" style="font-size:.82rem;color:var(--muted)">0 seleccionado(s)</span>
      <button id="btnEnviarRec" onclick="enviarRecordatorios()"
        style="padding:9px 20px;border-radius:10px;border:none;background:var(--orange);color:white;font-size:.84rem;font-weight:600;cursor:pointer;font-family:'Sora',sans-serif;display:flex;align-items:center;gap:6px">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        Enviar correos
      </button>
    </div>
  </div>

  <div style="background:white;border-radius:14px;border:1px solid var(--border);overflow:hidden">
    <div style="padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
      <div style="font-family:'Sora',sans-serif;font-weight:700;font-size:.92rem">Historial de envíos</div>
      <button onclick="cargarHistorialRec()" style="padding:6px 14px;border-radius:8px;border:1.5px solid var(--border);background:white;font-size:.78rem;font-weight:600;cursor:pointer">↻</button>
    </div>
    <div id="recHistorialLista" style="max-height:420px;overflow-y:auto">
      <div style="text-align:center;padding:32px;color:var(--muted)">Cargando...</div>
    </div>
  </div>
</div>
