<div class="header-tab">
    <h2>Mi Perfil</h2>
    <p style="color: var(--muted); font-size: 0.9rem;">Gestiona tu información personal y la seguridad de tu cuenta.</p>
</div>

<div class="perfil-container" style="display: grid; gap: 24px; max-width: 800px; margin: 20px auto; padding-bottom: 40px;">
    
    <div class="card" style="padding: 24px; border-radius: 12px; background: white; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
        <h3 style="margin-bottom: 20px; color: var(--text-dark); border-bottom: 1px solid #eee; padding-bottom: 10px;">Datos Personales</h3>
        
        <form id="formDatosPerfil" style="display: flex; flex-direction: column; gap: 16px;">
            <div style="display: flex; align-items: center; gap: 20px; margin-bottom: 10px;">
                <div id="previewAvatarContainer" style="width: 100px; height: 100px; border-radius: 50%; background: var(--bg-body); display: flex; align-items: center; justify-content: center; overflow: hidden; border: 2px dashed #ccc;">
                    <span id="avatarPlaceholder" style="color: #999; font-size: 0.8rem;">Sin foto</span>
                </div>
                <div>
                    <label style="display: block; font-weight: 600; margin-bottom: 8px;">Foto de Perfil</label>
                    <input type="file" id="fotoPerfilInput" accept=".jpg, .jpeg, .png" style="font-size: 0.9rem;">
                    <p style="font-size: 0.75rem; color: var(--muted); margin-top: 5px;">Formatos permitidos: JPG, PNG. Máx 5MB.</p>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                <div>
                    <label style="font-weight: 600; font-size: 0.85rem;">Nombre Completo</label>
                    <input type="text" id="nombrePerfil" class="input-form" required style="width: 100%;">
                </div>
                <div>
                    <label style="font-weight: 600; font-size: 0.85rem;">Usuario</label>
                    <input type="text" id="usernamePerfil" class="input-form" required style="width: 100%;">
                </div>
            </div>
            
            <div>
                <label style="font-weight: 600; font-size: 0.85rem;">Correo Electrónico <span style="color:var(--muted);font-weight:normal;">(No editable)</span></label>
                <input type="email" id="correoPerfil" class="input-form" disabled style="width: 100%; background: #f5f5f5; cursor: not-allowed;">
            </div>

            <button type="submit" class="btn-primary" style="align-self: flex-start; margin-top: 10px;">
                Guardar Cambios Personales
            </button>
        </form>
    </div>

    <div class="card" style="padding: 24px; border-radius: 12px; background: white; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
        <h3 style="margin-bottom: 20px; color: var(--text-dark); border-bottom: 1px solid #eee; padding-bottom: 10px;">Seguridad</h3>
        
        <form id="formPasswordPerfil" style="display: flex; flex-direction: column; gap: 16px;">
            <div>
                <label style="font-weight: 600; font-size: 0.85rem;">Contraseña Actual</label>
                <input type="password" id="passwordActual" class="input-form" required style="width: 100%;">
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                <div>
                    <label style="font-weight: 600; font-size: 0.85rem;">Nueva Contraseña</label>
                    <input type="password" id="passwordNueva" class="input-form" required style="width: 100%;">
                </div>
                <div>
                    <label style="font-weight: 600; font-size: 0.85rem;">Confirmar Nueva Contraseña</label>
                    <input type="password" id="passwordConfirmar" class="input-form" required style="width: 100%;">
                </div>
            </div>

            <button type="submit" class="btn-primary" style="align-self: flex-start; margin-top: 10px; background: var(--text-dark);">
                Actualizar Contraseña
            </button>
        </form>
    </div>
</div>
