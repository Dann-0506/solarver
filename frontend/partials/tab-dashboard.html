<div class="section-header" style="margin-bottom: 24px;"> <h3>Resumen General</h3>
</div>

<div class="stats-row">
  <div class="stat-card blue">
    <div class="stat-icon" style="background:rgba(30,133,200,0.1); color:var(--blue)">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><polyline points="16 11 18 13 22 9"/></svg>
    </div>
    <div class="stat-value" id="statActivos">0</div>
    <div class="stat-label">Clientes Activos</div>
  </div>

  <div class="stat-card green">
    <div class="stat-icon" style="background:rgba(46,213,115,0.1); color:var(--success)">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
    </div>
    <div class="stat-value" id="statCobros">$0</div>
    <div class="stat-label">Cobros del mes</div>
  </div>

  <div class="stat-card orange">
    <div class="stat-icon" style="background:rgba(255,122,31,0.1); color:var(--orange)">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
    </div>
    <div class="stat-value" id="statPendientes">0</div>
    <div class="stat-label">Pagos Pendientes</div>
  </div>

  <div class="stat-card red">
    <div class="stat-icon" style="background:rgba(231,76,60,0.1); color:var(--error)">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    </div>
    <div class="stat-value" id="statAtrasados">0</div>
    <div class="stat-label">Clientes en Mora</div>
  </div>
</div>

<div class="two-col">
  
  <div class="card">
    <div class="card-header">
      <h4>Actividad Reciente</h4>
      <button class="btn-secondary" style="padding: 4px 10px; font-size: 0.75rem;" onclick="document.querySelector('[data-tab=historial]').click()">Ver todo</button>
    </div>
    <div class="card-body" id="dashHistorial">
      <div style="text-align:center; padding:40px; color:var(--muted)">Cargando actividad...</div>
    </div>
  </div>

  <div style="display: flex; flex-direction: column; gap: 20px;">
    
    <div class="card">
      <div class="card-header">
        <h4>Accesos Rápidos</h4>
      </div>
      <div class="card-body" style="display: flex; flex-direction: column; gap: 12px;">
        <button class="btn-primary" onclick="document.querySelector('[data-tab=clientes]').click(); setTimeout(()=>abrirModalCliente('crear'), 300)">+ Nuevo Cliente</button>
        <button class="btn-secondary" style="width: 100%;" onclick="document.querySelector('[data-tab=pagos]').click(); setTimeout(()=>abrirModalPago(), 300)">Registrar Pago</button>
        <button class="btn-secondary" style="width: 100%; border-color: var(--blue); color: var(--blue-d);" onclick="document.querySelector('[data-tab=reportes]').click()">Reporte Mensual</button>
      </div>
    </div>

    <div class="card">
      <div class="card-header"><h4>Deudas Próximas</h4></div>
      <div class="card-body" id="dashClientesDeuda" style="font-size: 0.85rem;">
        <div style="text-align:center; padding:20px; color:var(--muted)">Cargando...</div>
      </div>
    </div>

    <div class="card">
      <div class="card-header"><h4>Recordatorios</h4></div>
      <div class="card-body" id="dashRecordatorios" style="font-size: 0.85rem;">
        <div style="text-align:center; padding:20px; color:var(--muted)">Cargando...</div>
      </div>
    </div>

  </div>
</div>
