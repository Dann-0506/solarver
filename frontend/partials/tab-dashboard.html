  Archivo: frontend/partials/tab-dashboard.html
  Uso: innerHTML via loadPartial() en admin.js y empleado.js
-->
<div class="stats-row">
  <div class="stat-card blue">
    <div class="stat-icon" style="background:#EBF5FD">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#1E85C8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    </div>
    <div class="stat-trend trend-up">+8 mes</div>
    <div class="stat-value" id="statClientes">—</div>
    <div class="stat-label">Clientes totales</div>
  </div>
  <div class="stat-card orange">
    <div class="stat-icon" style="background:#FFF3EA">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#FF7A1F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
    </div>
    <div class="stat-trend trend-up">+12%</div>
    <div class="stat-value" id="statIngresos">—</div>
    <div class="stat-label">Ingresos totales</div>
  </div>
  <div class="stat-card green">
    <div class="stat-icon" style="background:#E8F8EF">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#27AE60" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <div class="stat-trend trend-up">Este mes</div>
    <div class="stat-value" id="statPagos">—</div>
    <div class="stat-label">Pagos confirmados</div>
  </div>
  <div class="stat-card red">
    <div class="stat-icon" style="background:#FDECEA">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#E74C3C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
    </div>
    <div class="stat-trend trend-down">Urgente</div>
    <div class="stat-value" id="statAtrasadas">—</div>
    <div class="stat-label">Deudas atrasadas</div>
  </div>
</div>

<div class="two-col">
  <div class="card">
    <div class="card-header">
      <h4>Clientes con deuda próxima</h4>
    </div>
    <div class="card-body" id="dashClientesDeuda">
      <div style="text-align:center;padding:24px;color:var(--muted)">Cargando...</div>
    </div>
  </div>
  <div class="card">
    <div class="card-header">
      <h4>Recordatorios recientes</h4>
      <button class="btn-blue" style="font-size:.76rem;padding:7px 14px" onclick="showTab('notificaciones')">+ Enviar</button>
    </div>
    <div class="card-body" id="dashRecordatorios">
      <div style="text-align:center;padding:24px;color:var(--muted)">Cargando...</div>
    </div>
  </div>
</div>
