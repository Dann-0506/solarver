<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SolarVer - Iniciar Sesión</title>
    <link rel="stylesheet" href ="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap">
    <link rel="stylesheet" href="../styles/base.css">
    <link rel="stylesheet" href="../styles/login.css">
    <!-- Animación del spinner: definida aquí porque solo aplica a esta vista -->
    <style>
        .loading-spinner {
            display: inline-block;
            width: 16px; height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg);} }
    </style>
</head>

<body>
    
    <!-- Sección: Panel izquierdo — presentación y branding -->
    <div class="left-panel">
        <div class="panel-title">Bienvenido a <span>SolarVer</span></div>
        <p class="panel-subtitle">Sistema de gestión de clienes y cobros.</p>
        <div class="dots"><span></span><span></span><span></span></div>
    </div>

    <!-- Sección: Panel derecho — formulario de inicio de sesión -->
    <div class="right-panel">
        <div class="login-box">
            <div class="login-header">
                <p>Portal de Acceso</p>
                <h2>Inicia <span>sesión</span></h2>
            </div>

            <div class="alert error" id="alertError">
                <svg xmlns="http://www.w3.org/2000/svg" widht="16" height="16" fill="currentColor" style="margin-right:8px;flex-shrink:0" viewBox="0 0 16 16">
                    <path d="M8 1a7 7 0 1 0 0 14A7 7 0 0 0 8 1zm0 3a.75.75 0 0 1 .75.75v3.5a.75.75 0 0 1-1.5 0v-3.5A.75.75 0 0 1 8 4zm0 7a1 1 0 1 1 0-2 1 1 0 0 1 0 2z"/>
                </svg>
                <span id="alertMsg">Credenciales incorrectas.</span>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label>Usuario</label>
                    <div class="input-wrap">
                        <svg mlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
                        </svg>
                        <input type="text" id="username" placeholder="Ingresa tu usuario" autocomplete="username">
                    </div>
                </div>

                <div class="form-group">
                    <label>Contraseña</label>
                    <div class="input-wrap">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
                        <button type="button" class="eye-toggle" id="btnTogglePass" aria-label="Mostrar contraseña">
                            <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn-login" id="btnLogin">Ingresar al sistema</button>
            </form>

            <div class="login-footer">¿Olvidaste tu contraseña? <a href="#">Contacte al administrador</a></div>
        </div>
    </div>

    <script type="module" src="../js/pages/login.js"></script>
</body>
</html>
