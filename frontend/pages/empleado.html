<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SolarVer – Panel Empleado</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles/base.css">
  <link rel="stylesheet" href="../styles/dashboard.css">
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-name">Solar<span>Ver</span></div>
    <div class="logo-sub">Panel Empleado</div>
  </div>
  <div class="admin-badge">
    <div class="av" id="sidebarInitials">EM</div>
    <div class="info">
      <div class="name" id="sidebarNombre">Cargando...</div>
      <div class="role">Empleado</div>
    </div>
  </div>
  <nav class="nav">
    <a href="#" class="nav-item active" data-tab="dashboard">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Resumen general
    </a>
    <a href="#" class="nav-item" data-tab="clientes">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Clientes
    </a>
    <a href="#" class="nav-item" data-tab="pagos">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
      Pagos y cobros
    </a>
    <a href="#" class="nav-item" data-tab="notificaciones">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      Recordatorios de Pago
    </a>
  </nav>
  <div class="sidebar-bottom">
    <button class="btn-logout" id="btnLogout">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Cerrar sesión
    </button>
  </div>
</aside>

<main class="main">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-title">Panel de <span>Empleado</span></div>
      <span class="env-pill" style="background:rgba(30,133,200,0.1);color:var(--blue-d)">Empleado</span>
    </div>
  </div>

  <div class="content">
    <!-- Todos los tabs del empleado vienen de partials compartidos -->
    <div id="tab-dashboard"      class="tab-content"></div>
    <div id="tab-clientes"       class="tab-content" style="display:none"></div>
    <div id="tab-pagos"          class="tab-content" style="display:none"></div>
    <div id="tab-notificaciones" class="tab-content" style="display:none"></div>
  </div>
</main>

<script type="module" src="../js/pages/empleado.js"></script>
</body>
</html>
